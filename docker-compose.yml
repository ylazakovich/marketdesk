x-app-image: &app-image
  # Explicit shared tag guarantees the initializer runs the exact app image while
  # retaining Compose's project-level isolation between parallel deployments.
  image: ${COMPOSE_PROJECT_NAME:-marketdesk}-app:${MARKETDESK_IMAGE_TAG:-local}
  build:
    # Release deployments override this with an immutable git archive. Normal
    # development keeps using the checkout as the build context.
    context: ${MARKETDESK_BUILD_CONTEXT:-.}
    dockerfile: Dockerfile
    args:
      MARKETDESK_RELEASE_TAG: ${MARKETDESK_RELEASE_TAG:-}

services:
  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    container_name: marketdesk-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-marketdesk}
      # No known password fallback: internal deployments without DB_PASSWORD fail
      # closed in the Postgres image. External DATABASE_URL deployments receive a
      # non-secret unused placeholder so the bundled service can stay unselected by
      # the app without forcing an unrelated credential.
      POSTGRES_PASSWORD: ${DB_PASSWORD:-${DATABASE_URL:+external-database-unused}}
      POSTGRES_DB: ${DB_NAME:-marketdesk}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./src/backend/persistence/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-marketdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - marketdesk-network
    restart: unless-stopped

  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    container_name: marketdesk-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # Only enable auth when REDIS_PASSWORD is non-empty. `--requirepass ""` (the old
    # form when the var was empty) makes redis-server exit on boot, so build the args
    # conditionally in a shell entrypoint instead.
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
               exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
             else
               exec redis-server --appendonly yes;
             fi'
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - marketdesk-network
    restart: unless-stopped

  upload-storage-init:
    <<: *app-image
    # This one-shot process is the only root process in the application image.
    # Its command is deliberately fixed to the upload mount; do not make the
    # ownership target environment-configurable.
    user: "0:0"
    command:
      - sh
      - -ceu
      - |
        mkdir -p /app/uploads/workspaces
        chown -R 1001:1001 /app/uploads
    volumes:
      - ./uploads:/app/uploads
    network_mode: none
    restart: "no"

  app:
    <<: *app-image
    container_name: marketdesk-app
    env_file:
      - ${MARKETDESK_ENV_FILE:-./.env}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_NAME: ${APP_NAME:-hermes-marketdesk}
      APP_PORT: ${APP_PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # Leave DATABASE_URL empty to use the individual internal-Compose fields below,
      # or set it explicitly for a managed/external PostgreSQL endpoint.
      DATABASE_URL: ${DATABASE_URL:-}
      # The Compose PostgreSQL service is plaintext inside the private Docker network.
      DB_SSL_MODE: ${DB_SSL_MODE:?DB_SSL_MODE must be set (use disable for internal Compose PostgreSQL)}
      # DATABASE_URL takes precedence for external databases. Without it, always
      # target the bundled service rather than inheriting native-dev localhost.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-marketdesk}
      DB_PASSWORD: ${DB_PASSWORD:-${DATABASE_URL:+external-database-unused}}
      DB_NAME: ${DB_NAME:-marketdesk}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # The app runs in Docker while Hermes Agent runs natively on the same VPS.
      # host.docker.internal is mapped to the Docker host via extra_hosts below.
      HERMES_API_URL: ${HERMES_API_URL:-http://host.docker.internal:8642/v1}
      HERMES_API_KEY: ${HERMES_API_KEY:?HERMES_API_KEY must match Hermes API_SERVER_KEY}
      HERMES_MODEL: ${HERMES_MODEL:-hermes-agent}
      HERMES_REQUEST_TIMEOUT_MS: ${HERMES_REQUEST_TIMEOUT_MS:-120000}
      TIMEZONE: ${TIMEZONE:-UTC}
      # Keep the container storage path aligned with the fixed init-service target.
      UPLOAD_DIR: /app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    depends_on:
      upload-storage-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # NOTE: the built frontend (dist/frontend) and backend (dist/backend) are baked
    # into the image and the backend serves the SPA, so dist is intentionally NOT
    # bind-mounted (a host mount would shadow the image build). Only persist uploads.
    volumes:
      - ./uploads:/app/uploads
    networks:
      - marketdesk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  marketdesk-network:
    driver: bridge
